name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --tag ${{ github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --bin bopen

      - name: Create tarball
        run: |
          mkdir -p bopen
          cp target/release/bopen bopen/
          tar -czvf bopen-x86_64-unknown-linux-gnu.tar.gz bopen/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bopen-x86_64-unknown-linux-gnu.tar.gz
          body: ${{ steps.git-cliff.outputs.content }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
